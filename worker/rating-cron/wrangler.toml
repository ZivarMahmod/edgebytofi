name = "edgebytofi-rating-cron"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Ingen publik HTTP-yta — Workern körs ENBART på sitt cron-schema.
# Stänger *.workers.dev-URL:en så ?run=1 inte kan triggas publikt.
workers_dev = false
preview_urls = false

# Morgonpass: 04:00 UTC ≈ 06:00 svensk tid (05:00 vinter / 06:00 sommar).
# Alltid klart före öppning 10:00.
[triggers]
crons = ["0 4 * * *"]

[[kv_namespaces]]
binding = "RATING_KV"
id = "ac9a76a907714f168270c0e1fc3f00b8"
